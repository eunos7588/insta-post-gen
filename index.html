<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram投稿ジェネレーター｜飯塚BASE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #ff6b35;
    --accent2: #ffb347;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-sub { font-size: 12px; color: var(--text3); margin-left: auto; }

  main { max-width: 660px; margin: 0 auto; padding: 28px 20px 80px; }

  .apikey-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 24px;
  }
  .apikey-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .apikey-label { font-size: 13px; font-weight: 500; }
  .apikey-status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; }
  .dot.ok { background: var(--success); }
  .apikey-row { display: flex; gap: 8px; }

  input[type=password], input[type=text], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .save-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .save-btn:hover { border-color: var(--accent); color: var(--accent); }
  .apikey-hint { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.6; }
  .apikey-hint a { color: var(--accent); text-decoration: none; }

  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(255,107,53,0.04); }
  .drop-icon { font-size: 38px; margin-bottom: 12px; display: block; }
  .drop-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--text2); }

  #previewWrap {
    display: none;
    margin-bottom: 16px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  #previewImg { width: 100%; max-height: 280px; object-fit: contain; background: var(--surface); display: block; }
  .change-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; padding: 5px 10px;
    border-radius: 6px; cursor: pointer; backdrop-filter: blur(6px);
  }
  .change-btn:hover { color: var(--text); }

  .options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .opt-group label { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .extra-wrap { margin-bottom: 18px; }
  .extra-wrap label { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  .gen-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 24px;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .loading-wrap { display: none; text-align: center; padding: 32px 0; margin-bottom: 24px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }

  .result-section { display: none; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .result-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .result-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .copy-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    padding: 4px 10px; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }
  .result-body { padding: 16px; font-size: 14px; line-height: 1.9; white-space: pre-wrap; color: var(--text); }
  .hashtag-body { padding: 16px; font-size: 13px; line-height: 2.2; color: var(--accent2); word-break: break-all; }
  .time-body { padding: 14px 16px; font-size: 13px; color: var(--text2); line-height: 1.8; }
  .analysis-body { padding: 14px 16px; font-size: 13px; color: var(--text2); line-height: 1.8; }

  .copy-all-btn {
    width: 100%; padding: 13px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-bottom: 10px;
  }
  .copy-all-btn:hover { border-color: var(--accent); color: var(--accent); }
  .reset-btn {
    width: 100%; padding: 11px; background: none;
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text3); font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text2); border-color: var(--text3); }

  .err-box {
    display: none; background: rgba(248,113,113,0.07);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: var(--radius); padding: 14px 16px;
    font-size: 13px; color: var(--danger); margin-bottom: 16px; line-height: 1.7;
  }

  footer { text-align: center; padding: 20px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>
<body>

<header>
  <div class="logo">INSTA POST GEN</div>
  <div class="logo-sub">飯塚BASE専用</div>
</header>

<main>

  <div class="apikey-section">
    <div class="apikey-header">
      <span class="apikey-label">🔑 Anthropic APIキー</span>
      <span class="apikey-status">
        <span class="dot" id="keyDot"></span>
        <span id="keyStatus">未設定</span>
      </span>
    </div>
    <div class="apikey-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
      <button class="save-btn" onclick="saveKey()">保存</button>
    </div>
    <div class="apikey-hint">
      キーはこのブラウザにのみ保存されます（次回から自動入力）。
      まだの方は <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> で発行してください。
    </div>
  </div>

  <div class="drop-zone" id="dropZone"
    onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    <span class="drop-icon">📸</span>
    <div class="drop-title">写真をドロップ、またはタップして選択</div>
    <div class="drop-sub">JPG / PNG / WEBP 対応</div>
  </div>

  <div id="previewWrap">
    <img id="previewImg" alt="プレビュー">
    <button class="change-btn" onclick="resetPhoto()">変更</button>
  </div>

  <div class="options-row">
    <div class="opt-group">
      <label>投稿タイプ</label>
      <select id="postType">
        <option value="buy">買取商品紹介</option>
        <option value="event">イベント・セール</option>
        <option value="info">お知らせ</option>
      </select>
    </div>
    <div class="opt-group">
      <label>トーン</label>
      <select id="tone">
        <option value="friendly">親しみやすく</option>
        <option value="professional">プロフェッショナル</option>
        <option value="pop">ポップ・カジュアル</option>
      </select>
    </div>
  </div>

  <div class="extra-wrap">
    <label>補足（価格・状態・アピールポイントなど）任意</label>
    <input type="text" id="extra" placeholder="例：28000円、美品、付属品完備">
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">📝 投稿文を自動生成する</button>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text">写真を解析して投稿文を生成中...</div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="result-section" id="resultSection">

    <div class="result-block">
      <div class="result-head"><span class="result-label">AIが読み取った情報</span></div>
      <div class="analysis-body" id="analysisOut"></div>
    </div>

    <div class="result-block">
      <div class="result-head">
        <span class="result-label">キャプション</span>
        <button class="copy-btn" onclick="copyEl('captionOut', this)">コピー</button>
      </div>
      <div class="result-body" id="captionOut"></div>
    </div>

    <div class="result-block">
      <div class="result-head">
        <span class="result-label">ハッシュタグ</span>
        <button class="copy-btn" onclick="copyEl('hashtagOut', this)">コピー</button>
      </div>
      <div class="hashtag-body" id="hashtagOut"></div>
    </div>

    <div class="result-block">
      <div class="result-head"><span class="result-label">おすすめ投稿時間</span></div>
      <div class="time-body" id="timeOut"></div>
    </div>

    <button class="copy-all-btn" onclick="copyAll()">📋 キャプション＋ハッシュタグを全コピー</button>
    <button class="reset-btn" onclick="resetAll()">別の写真でやり直す</button>

  </div>

</main>

<footer>飯塚BASE Instagram投稿ジェネレーター — ブラウザ完結型</footer>

<script>
let currentFile = null;
let currentMediaType = 'image/jpeg';
let lastCaption = '';
let lastHashtag = '';

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    showErr('APIキーの形式が正しくありません。「sk-ant-」から始まるキーを入力してください。');
    return;
  }
  localStorage.setItem('anthropic_key', key);
  updateKeyStatus(true);
  document.getElementById('errBox').style.display = 'none';
}

function loadKey() {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    updateKeyStatus(true);
  }
}

function updateKeyStatus(ok) {
  document.getElementById('keyDot').className = 'dot' + (ok ? ' ok' : '');
  document.getElementById('keyStatus').textContent = ok ? '設定済み ✓' : '未設定';
}

function getKey() {
  return localStorage.getItem('anthropic_key') || document.getElementById('apiKeyInput').value.trim();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

function handleFile(file) {
  if (!file) return;
  currentFile = file;
  currentMediaType = ['image/jpeg','image/png','image/gif','image/webp'].includes(file.type) ? file.type : 'image/jpeg';
  const url = URL.createObjectURL(file);
  document.getElementById('previewImg').src = url;
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
}

function resetPhoto() {
  currentFile = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('dropZone').style.display = 'block';
  document.getElementById('fileInput').value = '';
}

async function generate() {
  const key = getKey();
  if (!key || !key.startsWith('sk-ant-')) {
    showErr('APIキーを入力して「保存」を押してください。');
    return;
  }
  if (!currentFile) {
    showErr('写真を選択してください。');
    return;
  }

  const postType = document.getElementById('postType').value;
  const tone = document.getElementById('tone').value;
  const extra = document.getElementById('extra').value.trim();
  const toneLabel = { friendly:'親しみやすく温かみのある', professional:'プロフェッショナルで信頼感のある', pop:'ポップでカジュアルな元気のある' }[tone];
  const typeLabel = { buy:'買取商品紹介', event:'イベント・セール', info:'お知らせ' }[postType];

  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('genBtn').disabled = true;

  try {
    const base64 = await fileToBase64(currentFile);

    const prompt = `あなたはInstagramのSNS運用のプロです。添付された商品写真を見て以下を行ってください。

投稿タイプ: ${typeLabel}
トーン: ${toneLabel}
${extra ? `補足情報: ${extra}` : ''}

必ず以下のJSON形式のみで返してください。余計なテキスト・マークダウン・バッククォートは一切不要です：
{"analysis":"写真から読み取った商品情報（カテゴリ・ブランド・状態・特徴など具体的に2〜3文・日本語）","caption":"投稿キャプション本文（改行あり・絵文字使用・200〜300文字・日本語）","hashtags":"ハッシュタグ（スペース区切り・15〜20個・#から始まる・日本語メイン）"}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentMediaType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('APIキーが正しくありません。確認してください。');
      if (res.status === 429) throw new Error('リクエストが多すぎます。少し待ってから再試行してください。');
      throw new Error(err.error?.message || `エラー (HTTP ${res.status})`);
    }

    const data = await res.json();
    const rawText = data.content.map(i => i.text || '').join('');
    const match = rawText.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('レスポンスの解析に失敗しました。もう一度お試しください。');
    const parsed = JSON.parse(match[0]);

    lastCaption = parsed.caption || '';
    lastHashtag = parsed.hashtags || '';

    document.getElementById('analysisOut').textContent = parsed.analysis || '';
    document.getElementById('captionOut').textContent = lastCaption;
    document.getElementById('hashtagOut').textContent = lastHashtag;
    document.getElementById('timeOut').textContent = getTimeText(postType);
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    document.getElementById('loadingWrap').style.display = 'none';
    showErr(e.message || '不明なエラーが発生しました。');
  }

  document.getElementById('genBtn').disabled = false;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    reader.readAsDataURL(file);
  });
}

function getTimeText(type) {
  return { buy:'🕐 火・木・土の 12:00〜13:00 または 19:00〜21:00\n昼休みや夜のスマホ時間帯が効果的です', event:'🕐 イベント3〜5日前に投稿 + 当日朝 8:00〜9:00\n早めの告知と当日リマインドが鉄則です', info:'🕐 月曜または水曜の 10:00〜11:00\n週初め・週中のチェック習慣に乗せましょう' }[type];
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function copyEl(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  btn.textContent = 'コピー済み！';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
}

function copyAll() {
  navigator.clipboard.writeText(lastCaption + '\n\n' + lastHashtag);
}

function resetAll() {
  resetPhoto();
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('extra').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadKey();
</script>
</body>
</html>
