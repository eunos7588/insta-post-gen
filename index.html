<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instagram投稿ジェネレーター｜飯塚BASE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #ff6b35;
    --accent2: #ffb347;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --success: #4ade80;
    --danger: #f87171;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; -webkit-text-size-adjust: 100%; }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: sticky;
    top: 0;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  main { max-width: 600px; margin: 0 auto; padding: 20px 16px 80px; }

  .apikey-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .apikey-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .apikey-label { font-size: 13px; font-weight: 500; }
  .apikey-status { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; flex-shrink: 0; }
  .dot.ok { background: var(--success); }
  .apikey-row { display: flex; gap: 8px; }

  input[type=password], input[type=text], select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    padding: 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }

  .save-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .apikey-hint { font-size: 11px; color: var(--text3); margin-top: 8px; line-height: 1.6; }
  .apikey-hint a { color: var(--accent); text-decoration: none; }

  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 16px;
  }
  .drop-zone.drag { border-color: var(--accent); background: rgba(255,107,53,0.04); }
  .drop-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .drop-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--text2); }

  #previewWrap {
    display: none;
    margin-bottom: 16px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  #previewImg { width: 100%; max-height: 260px; object-fit: contain; background: var(--surface); display: block; }
  .change-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); border: 1px solid var(--border);
    color: var(--text2); font-size: 13px; padding: 6px 12px;
    border-radius: 6px; cursor: pointer;
  }

  .options-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .opt-group label { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 12px; }
  .select-wrap select { padding-right: 32px; }

  .extra-wrap { margin-bottom: 16px; }
  .extra-wrap label { display: block; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

  .gen-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 20px;
    -webkit-appearance: none;
  }
  .gen-btn:active { transform: scale(0.98); opacity: 0.9; }
  .gen-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .loading-wrap { display: none; text-align: center; padding: 32px 0; margin-bottom: 20px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }

  .result-section { display: none; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .result-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .result-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .result-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .copy-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 5px 12px; cursor: pointer; transition: all 0.15s; min-width: 70px; text-align: center; }
  .copy-btn:active { border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { border-color: var(--success); color: var(--success); }
  .result-body { padding: 14px; font-size: 14px; line-height: 1.9; white-space: pre-wrap; color: var(--text); }
  .hashtag-body { padding: 14px; font-size: 13px; line-height: 2.2; color: var(--accent2); word-break: break-all; }
  .analysis-body { padding: 12px 14px; font-size: 13px; color: var(--text2); line-height: 1.8; }

  .tips-block { background: rgba(255,179,71,0.06); border: 1px solid rgba(255,179,71,0.2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; }
  .tips-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .tips-text { font-size: 13px; color: var(--accent2); line-height: 1.7; }

  .copy-all-btn { width: 100%; padding: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; -webkit-appearance: none; }
  .copy-all-btn:active { border-color: var(--accent); color: var(--accent); }

  .reset-btn { width: 100%; padding: 12px; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text3); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; -webkit-appearance: none; }

  .err-box { display: none; background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.25); border-radius: var(--radius); padding: 14px; font-size: 13px; color: var(--danger); margin-bottom: 16px; line-height: 1.7; }

  footer { text-align: center; padding: 20px 16px; font-size: 11px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 40px; }

  @media (max-width: 400px) {
    .options-row { grid-template-columns: 1fr; }
    .drop-zone { padding: 32px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">INSTA POST GEN</div>
  <div class="logo-sub">飯塚BASE専用</div>
</header>

<main>

  <div class="apikey-section">
    <div class="apikey-header">
      <span class="apikey-label">🔑 Anthropic APIキー</span>
      <span class="apikey-status">
        <span class="dot" id="keyDot"></span>
        <span id="keyStatus">未設定</span>
      </span>
    </div>
    <div class="apikey-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off">
      <button class="save-btn" onclick="saveKey()">保存</button>
    </div>
    <div class="apikey-hint">
      キーはこのブラウザにのみ保存されます（次回から自動入力）。
      まだの方は <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> で発行してください。
    </div>
  </div>

  <div class="drop-zone" id="dropZone"
    onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    <span class="drop-icon">📸</span>
    <div class="drop-title">写真をタップして選択</div>
    <div class="drop-sub">JPG / PNG / WEBP 対応</div>
  </div>

  <div id="previewWrap">
    <img id="previewImg" alt="プレビュー">
    <button class="change-btn" onclick="resetPhoto()">変更</button>
  </div>

  <div class="options-row">
    <div class="opt-group">
      <label>投稿タイプ</label>
      <div class="select-wrap">
        <select id="postType">
          <option value="buy">買取商品紹介</option>
          <option value="event">イベント・セール</option>
          <option value="info">お知らせ</option>
        </select>
      </div>
    </div>
    <div class="opt-group">
      <label>トーン</label>
      <div class="select-wrap">
        <select id="tone">
          <option value="friendly">親しみやすく</option>
          <option value="professional">プロフェッショナル</option>
          <option value="pop">ポップ・カジュアル</option>
        </select>
      </div>
    </div>
  </div>

  <div class="extra-wrap">
    <label>補足（型番・価格・状態など）任意</label>
    <input type="text" id="extra" placeholder="例：ダイワ イグジスト、28000円、美品">
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">📝 投稿文を自動生成する</button>

  <div class="loading-wrap" id="loadingWrap">
    <div class="spinner"></div>
    <div class="loading-text">写真を解析して投稿文を生成中...</div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="result-section" id="resultSection">

    <div class="result-block">
      <div class="result-head"><span class="result-label">AIが読み取った情報</span></div>
      <div class="analysis-body" id="analysisOut"></div>
    </div>

    <div class="result-block">
      <div class="result-head">
        <span class="result-label">キャプション</span>
        <button class="copy-btn" onclick="copyEl('captionOut', this)">コピー</button>
      </div>
      <div class="result-body" id="captionOut"></div>
    </div>

    <div class="result-block">
      <div class="result-head">
        <span class="result-label">ハッシュタグ</span>
        <button class="copy-btn" onclick="copyEl('hashtagOut', this)">コピー</button>
      </div>
      <div class="hashtag-body" id="hashtagOut"></div>
    </div>

    <div class="tips-block">
      <div class="tips-label">💡 投稿 Tips</div>
      <div class="tips-text" id="tipsText"></div>
    </div>

    <button class="copy-all-btn" onclick="copyAll()">📋 キャプション＋ハッシュタグを全コピー</button>
    <button class="reset-btn" onclick="resetAll()">別の写真でやり直す</button>

  </div>

</main>

<footer>飯塚BASE Instagram投稿ジェネレーター</footer>

<script>
let currentFile = null;
let currentMediaType = 'image/jpeg';
let lastCaption = '';
let lastHashtag = '';

const TIPS = [
  '投稿直後の30分以内にコメント返信すると、アルゴリズムに好まれやすくなります。',
  'ストーリーズと投稿を同日に出すとリーチが上がりやすいです。',
  '写真は自然光で撮ると見栄えが格段に良くなります。背景は白や木目がおすすめ。',
  'ハッシュタグは投稿文末ではなく、最初のコメントに入れる方法も効果的です。',
  '週3〜4回の定期投稿がフォロワー増加に最も効果的と言われています。',
  '商品の使用シーンを想像させる文章は、問い合わせ率を高める効果があります。',
  'リールとフィード投稿を交互に出すと、異なる層にリーチできます。',
  '火・木・土の19〜21時は一般的にエンゲージメントが高い時間帯です。',
  'プロフィールのリンクを問い合わせ先に設定すると問い合わせが増えます。',
  '同じカテゴリの商品をまとめて「新着〇点入荷！」と投稿するのも反応が良いです。',
  'コメントに質問を入れると（「気になる方はDMへ！」など）エンゲージメントが上がります。',
  'フォロワーの多いローカルアカウントをタグ付けすると拡散されやすくなります。',
  '投稿の最初の1〜2行が最も重要です。続きを読みたくなる書き出しを意識しましょう。',
  'カメラロールの整理を兼ねて、週に1回まとめて撮影すると効率的です。',
  'Googleレンズで型番を調べて補足欄に入れると、より正確な投稿文が生成されます。',
];

function getRandomTip() {
  return TIPS[Math.floor(Math.random() * TIPS.length)];
}

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    showErr('APIキーの形式が正しくありません。「sk-ant-」から始まるキーを入力してください。');
    return;
  }
  localStorage.setItem('anthropic_key', key);
  updateKeyStatus(true);
  document.getElementById('errBox').style.display = 'none';
}

function loadKey() {
  const saved = localStorage.getItem('anthropic_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    updateKeyStatus(true);
  }
}

function updateKeyStatus(ok) {
  document.getElementById('keyDot').className = 'dot' + (ok ? ' ok' : '');
  document.getElementById('keyStatus').textContent = ok ? '設定済み ✓' : '未設定';
}

function getKey() {
  return localStorage.getItem('anthropic_key') || document.getElementById('apiKeyInput').value.trim();
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

function handleFile(file) {
  if (!file) return;
  currentFile = file;
  currentMediaType = ['image/jpeg','image/png','image/gif','image/webp'].includes(file.type) ? file.type : 'image/jpeg';
  const url = URL.createObjectURL(file);
  document.getElementById('previewImg').src = url;
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
}

function resetPhoto() {
  currentFile = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('dropZone').style.display = 'block';
  document.getElementById('fileInput').value = '';
}

async function generate() {
  const key = getKey();
  if (!key || !key.startsWith('sk-ant-')) {
    showErr('APIキーを入力して「保存」を押してください。');
    return;
  }
  if (!currentFile) {
    showErr('写真を選択してください。');
    return;
  }

  const postType = document.getElementById('postType').value;
  const tone = document.getElementById('tone').value;
  const extra = document.getElementById('extra').value.trim();
  const toneLabel = { friendly:'親しみやすく温かみのある', professional:'プロフェッショナルで信頼感のある', pop:'ポップでカジュアルな元気のある' }[tone];
  const typeLabel = { buy:'買取商品紹介', event:'イベント・セール', info:'お知らせ' }[postType];

  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('genBtn').disabled = true;

  try {
    const base64 = await fileToBase64(currentFile);

    const prompt = `あなたはInstagramのSNS運用のプロです。添付された商品写真を見て以下を行ってください。

投稿タイプ: ${typeLabel}
トーン: ${toneLabel}
${extra ? `補足情報: ${extra}` : ''}

重要ルール：captionにはハッシュタグ（#から始まる単語）を絶対に含めないこと。ハッシュタグはhashtagsフィールドにのみ入れること。

必ず以下のJSON形式のみで返してください。余計なテキスト・マークダウン・バッククォートは一切不要です：
{"analysis":"写真から読み取った商品情報（カテゴリ・ブランド・状態・特徴など具体的に2〜3文・日本語）","caption":"投稿キャプション本文のみ（改行あり・絵文字使用・200〜300文字・日本語・ハッシュタグは含めない）","hashtags":"ハッシュタグのみ（スペース区切り・15〜20個・#から始まる・日本語メイン）"}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentMediaType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error('APIキーが正しくありません。新しいキーを発行して入力してください。');
      if (res.status === 429) throw new Error('リクエストが多すぎます。少し待ってから再試行してください。');
      throw new Error('エラー (HTTP ' + res.status + '): ' + (err.error?.message || '不明') + ' / キーを再確認してください');
    }

    const data = await res.json();
    const rawText = data.content.map(i => i.text || '').join('');
    const match = rawText.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('レスポンスの解析に失敗しました。もう一度お試しください。');
    const parsed = JSON.parse(match[0]);

    lastCaption = (parsed.caption || '').replace(/#\S+/g, '').trim();
    lastHashtag = parsed.hashtags || '';

    document.getElementById('analysisOut').textContent = parsed.analysis || '';
    document.getElementById('captionOut').textContent = lastCaption;
    document.getElementById('hashtagOut').textContent = lastHashtag;
    document.getElementById('tipsText').textContent = getRandomTip();

    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    document.getElementById('loadingWrap').style.display = 'none';
    showErr(e.message || '不明なエラーが発生しました。');
  }

  document.getElementById('genBtn').disabled = false;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    reader.readAsDataURL(file);
  });
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function copyEl(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent);
  btn.textContent = 'コピー済み！';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
}

function copyAll() {
  navigator.clipboard.writeText(lastCaption + '\n\n' + lastHashtag);
}

function resetAll() {
  resetPhoto();
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('extra').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

loadKey();
</script>
</body>
</html>
